syntax = "proto3";

package bootz;

import "google/protobuf/struct.proto";

import "github.com/openconfig/bootz/proto/bootz.proto";

option go_package = "github.com/openconfig/bootz/proto/test";

// The test service definition.
service Test {
  // Subscribe allows the test to subscribe to status report.
  rpc Subscribe(SubscribeRequest) returns (stream bootz.ReportStatusRequest) {} 
}

// Request message for Subscribe RPC.
message SubscribeRequest {
}
